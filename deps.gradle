ext {
    android_build_tools_version = '8.6.0'
    compose_version = '1.2.1'
    compose_compiler_version = '1.5.15'
    kotlin_version = '1.9.25'
    java_version = JavaVersion.VERSION_1_8
    dokka_version = '1.9.20'
    androidSdk = [
        compileVersion: 35,
        targetVersion : 34,
        minVersion    : 21,
    ]
    generated = [
        protoSrc: "$projectDir/protocol/protobufs",
    ]

    // CameraX version compatible with AGP 8.6+ and compileSdk 35
    camerax_version = '1.5.3'
}
